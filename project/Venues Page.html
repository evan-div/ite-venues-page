<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>Venues — In The Event</title>
  <link rel="stylesheet" href="kit.css" />
  <link rel="stylesheet" href="venues.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="venues-data.js?v=2"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Venues.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showFeatured": true,
      "headerStyle": "photo",
      "cardLayout": "3col",
      "showCapacityOnHover": true
    }/*EDITMODE-END*/;

    function App() {
      const [filter, setFilter] = useState('all');
      const [selected, setSelected] = useState(null);
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const featured = window.VENUES.find((v) => v.featured);
      const others = window.VENUES.filter((v) => !v.featured);

      const filtered = useMemo(() => {
        if (filter === 'all') return others;
        return others.filter((v) => v.region === filter);
      }, [filter, others]);

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      // Apply tweaks
      useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty(
          '--venues-grid-cols',
          tweaks.cardLayout === '2col' ? '2' :
          tweaks.cardLayout === '4col' ? '4' : '3'
        );
      }, [tweaks.cardLayout]);

      return (
        <>
          <Nav active="venues" />
          {tweaks.headerStyle !== 'minimal' && <VenuesHeader />}
          <FilterBar
            active={filter}
            setActive={setFilter}
            total={(tweaks.showFeatured && filter === 'all' ? 1 : 0) + filtered.length}
          />
          {tweaks.showFeatured && featured && filter === 'all' && (
            <FeaturedVenue v={featured} onView={setSelected} />
          )}
          <VenuesGrid list={filtered} onSelect={setSelected} />
          <VenueCTA />
          <Footer />

          <VenueModal v={selected} onClose={() => setSelected(null)} />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Layout">
              <TweakToggle
                label="Show featured venue"
                value={tweaks.showFeatured}
                onChange={(v) => setTweak('showFeatured', v)}
              />
              <TweakRadio
                label="Header style"
                value={tweaks.headerStyle}
                onChange={(v) => setTweak('headerStyle', v)}
                options={[
                  { value: 'photo', label: 'Photo' },
                  { value: 'minimal', label: 'Off' },
                ]}
              />
              <TweakRadio
                label="Card grid"
                value={tweaks.cardLayout}
                onChange={(v) => setTweak('cardLayout', v)}
                options={[
                  { value: '2col', label: '2 col' },
                  { value: '3col', label: '3 col' },
                  { value: '4col', label: '4 col' },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    /* Tweak: grid column count */
    .venues-grid {
      grid-template-columns: repeat(var(--venues-grid-cols, 3), 1fr) !important;
    }
  </style>
</body>
</html>
