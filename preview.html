<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <meta name="description" content="Venues In The Event knows inside out — rigged, staged, and floraled across Salt Lake City, Utah County, and mountain resorts." />
  <title>Venues — In The Event</title>

  <!-- CDN dependencies (require internet, no server needed) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>

  <style>
    /* =========================================================
       colors_and_type.css
       ========================================================= */
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;500;700&display=swap');

    :root {
      --ite-black:         #000000;
      --ite-white:         #FFFFFF;
      --ite-green-pear:    #AAB947;
      --ite-sage-green:    #7A8E46;
      --ite-midnight-navy: #181930;
      --ite-tea-green:     #C7DA84;
      --ite-green-gradient: linear-gradient(135deg, #C7DA84 0%, #AAB947 55%, #7A8E46 100%);
      --ite-green-gradient-v: linear-gradient(180deg, #C7DA84 0%, #AAB947 55%, #7A8E46 100%);

      --bg:            var(--ite-white);
      --bg-inverse:    var(--ite-midnight-navy);
      --bg-subtle:     #F5F6EE;
      --bg-muted:      #EDEFE2;
      --surface:       var(--ite-white);
      --surface-dark:  var(--ite-midnight-navy);

      --fg1:           var(--ite-midnight-navy);
      --fg2:           #4A4B60;
      --fg3:           #8A8B9B;
      --fg-inverse:    var(--ite-white);
      --fg-accent:     var(--ite-sage-green);

      --border:        #E3E4D8;
      --border-strong: #181930;
      --divider:       rgba(24, 25, 48, 0.08);

      --link:          var(--ite-sage-green);
      --link-hover:    var(--ite-midnight-navy);

      --font-sans:     'Jost', 'ITC Avant Garde Gothic', 'Avant Garde', 'Futura', 'Century Gothic', system-ui, sans-serif;
      --font-display:  var(--font-sans);
      --font-body:     var(--font-sans);
      --font-mono:     'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

      --fw-book:    400;
      --fw-medium:  500;
      --fw-bold:    700;

      --fs-display-xl: 88px;
      --fs-display-l:  64px;
      --fs-display-m:  48px;
      --fs-h1:         40px;
      --fs-h2:         32px;
      --fs-h3:         24px;
      --fs-h4:         20px;
      --fs-body-l:     18px;
      --fs-body:       16px;
      --fs-body-s:     14px;
      --fs-caption:    12px;
      --fs-eyebrow:    11px;

      --lh-tight:  1.05;
      --lh-snug:   1.2;
      --lh-normal: 1.5;
      --lh-loose:  1.7;

      --tracking-wide:    0.22em;
      --tracking-medium:  0.12em;
      --tracking-normal:  0.01em;
      --tracking-tight:   -0.01em;

      --space-0:   0;
      --space-1:   4px;
      --space-2:   8px;
      --space-3:   12px;
      --space-4:   16px;
      --space-5:   24px;
      --space-6:   32px;
      --space-7:   48px;
      --space-8:   64px;
      --space-9:   96px;
      --space-10: 128px;

      --radius-none: 0;
      --radius-sm:   2px;
      --radius-md:   4px;
      --radius-lg:   8px;
      --radius-xl:  16px;
      --radius-pill: 999px;

      --shadow-sm:  0 1px 2px rgba(24, 25, 48, 0.06);
      --shadow-md:  0 4px 12px rgba(24, 25, 48, 0.08);
      --shadow-lg:  0 12px 32px rgba(24, 25, 48, 0.12);
      --shadow-xl:  0 24px 60px rgba(24, 25, 48, 0.18);
      --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.08);

      --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --dur-fast:   120ms;
      --dur-base:   220ms;
      --dur-slow:   420ms;

      --container-max: 1240px;
      --container-gutter: 32px;
    }

    html, body {
      background: var(--bg);
      color: var(--fg1);
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: var(--lh-normal);
      font-weight: var(--fw-book);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    h1, .h1 {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-h1);
      line-height: var(--lh-tight);
      letter-spacing: var(--tracking-medium);
      text-transform: uppercase;
      color: var(--fg1);
      margin: 0;
    }
    h2, .h2 {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-h2);
      line-height: var(--lh-snug);
      letter-spacing: var(--tracking-medium);
      text-transform: uppercase;
      color: var(--fg1);
      margin: 0;
    }
    h3, .h3 {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-h3);
      line-height: var(--lh-snug);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--fg1);
      margin: 0;
    }
    h4, .h4 {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-h4);
      line-height: var(--lh-snug);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--fg1);
      margin: 0;
    }

    .display-xl {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-display-xl);
      line-height: var(--lh-tight);
      letter-spacing: var(--tracking-medium);
      text-transform: uppercase;
    }
    .display-l {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-display-l);
      line-height: var(--lh-tight);
      letter-spacing: var(--tracking-medium);
      text-transform: uppercase;
    }
    .display-m {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-display-m);
      line-height: var(--lh-tight);
      letter-spacing: var(--tracking-medium);
      text-transform: uppercase;
    }

    .eyebrow {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--fg2);
    }

    p, .body {
      font-family: var(--font-body);
      font-weight: var(--fw-book);
      font-size: var(--fs-body);
      line-height: var(--lh-loose);
      color: var(--fg1);
      margin: 0;
    }
    .body-l { font-size: var(--fs-body-l); line-height: var(--lh-loose); }
    .body-s { font-size: var(--fs-body-s); line-height: var(--lh-normal); color: var(--fg2); }
    .caption { font-size: var(--fs-caption); line-height: var(--lh-normal); color: var(--fg3); }

    a {
      color: var(--link);
      text-decoration: none;
      transition: color var(--dur-fast) var(--ease-out);
    }
    a:hover { color: var(--link-hover); }

    code, pre, .mono {
      font-family: var(--font-mono);
      font-size: 0.92em;
    }

    .uppercase { text-transform: uppercase; letter-spacing: var(--tracking-wide); }
    .on-dark   { color: var(--fg-inverse); }
    .on-dark .eyebrow,
    .on-dark p { color: rgba(255,255,255,0.78); }
    .gradient-text {
      background: var(--ite-green-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* =========================================================
       kit.css
       ========================================================= */
    * { box-sizing: border-box; }
    body { margin: 0; }

    .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

    .section { padding: 96px 0; }
    .section.tight { padding: 64px 0; }
    .section.dark { background: var(--ite-midnight-navy); color: #fff; }
    .section.subtle { background: #F5F6EE; }

    .eyebrow {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--fg2);
      margin: 0 0 8px;
    }
    .section.dark .eyebrow { color: var(--ite-tea-green); }

    .heading-hairline {
      height: 1px;
      background: var(--divider);
      margin: 8px 0 18px;
      width: 72px;
    }
    .section.dark .heading-hairline { background: rgba(255,255,255,0.3); }

    .display {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.05;
      margin: 0;
    }
    .display.xl { font-size: 72px; }
    .display.l  { font-size: 56px; }
    .display.m  { font-size: 40px; }
    .display.s  { font-size: 28px; }

    .body-l { font-size: 18px; line-height: 1.7; color: var(--fg1); max-width: 60ch; }
    .section.dark .body-l { color: rgba(255,255,255,0.8); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-display);
      font-weight: 500; font-size: 12px;
      letter-spacing: 0.22em; text-transform: uppercase;
      padding: 16px 28px;
      border-radius: 4px; border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: all 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .btn.primary { background: var(--ite-midnight-navy); color: #fff; }
    .btn.primary:hover { background: #000; transform: translateY(-1px); }
    .btn.secondary { background: transparent; color: var(--ite-midnight-navy); border-color: var(--ite-midnight-navy); }
    .btn.secondary:hover { background: var(--ite-midnight-navy); color: #fff; }
    .btn.gradient { background: transparent; color: #fff; border-color: rgba(255,255,255,0.8); }
    .btn.gradient:hover { background: #fff; color: var(--ite-midnight-navy); border-color: #fff; }
    .btn.ghost { background: transparent; color: var(--ite-sage-green); padding: 0; letter-spacing: 0.2em; border: 0; }
    .btn.ghost:hover { color: var(--ite-midnight-navy); }
    .section.dark .btn.secondary,
    .hero .btn.secondary { color: #fff; border-color: rgba(255,255,255,0.7); }
    .section.dark .btn.secondary:hover,
    .hero .btn.secondary:hover { background: #fff; color: var(--ite-midnight-navy); border-color: #fff; }

    /* Navigation */
    .nav {
      position: sticky; top: 0; z-index: 40;
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--divider);
    }
    .nav.dark {
      background: rgba(24, 25, 48, 0.92);
      border-bottom-color: rgba(255,255,255,0.1);
    }
    .nav .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .nav .brand img { height: 26px; display: block; }
    .nav .links { display: flex; gap: 28px; }
    .nav a {
      font-family: var(--font-display);
      font-weight: 500; font-size: 11px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--fg1); cursor: pointer;
    }
    .nav.dark a { color: #fff; }
    .nav a.active { color: var(--ite-sage-green); }
    .nav.dark a.active { color: var(--ite-tea-green); }
    .nav a:hover { color: var(--ite-sage-green); }

    /* Hero */
    .hero {
      position: relative;
      min-height: 620px;
      display: flex; align-items: center;
      background: var(--ite-midnight-navy);
      overflow: hidden;
    }
    .hero .photo {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(180deg, rgba(24,25,48,0.25) 0%, rgba(24,25,48,0.70) 100%),
        url('assets/photos/stage-purple.jpg');
      background-size: cover;
      background-position: center;
    }
    .hero .container { position: relative; color: #fff; padding-top: 80px; padding-bottom: 80px; }
    .hero .display { color: #fff; max-width: 16ch; }
    .hero .lead { color: rgba(255,255,255,0.78); max-width: 56ch; margin: 24px 0 36px; font-size: 19px; line-height: 1.6; }
    .hero .eyebrow { color: var(--ite-tea-green); }
    .hero .actions { display: flex; gap: 14px; flex-wrap: wrap; }
    .hero .stats {
      display: grid; grid-template-columns: repeat(3, auto);
      gap: 56px;
      margin-top: 80px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .hero .stats .n { font-family: var(--font-display); font-weight: 500; font-size: 44px; letter-spacing: 0.04em; color: #fff; }
    .hero .stats .n .grad { background: var(--ite-green-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero .stats .l { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: 4px; }

    /* Services */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-top: 48px;
    }
    .service {
      background: #fff;
      padding: 32px 24px 36px;
      min-height: 220px;
      display: flex; flex-direction: column; gap: 12px;
      cursor: pointer;
      transition: background 200ms;
    }
    .service:hover { background: #F5F6EE; }
    .service .icon { width: 28px; height: 28px; color: var(--ite-sage-green); }
    .service .name { font-family: var(--font-display); font-weight: 500; font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg1); }
    .service .desc { font-size: 14px; line-height: 1.6; color: var(--fg2); }
    .service .more { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ite-sage-green); margin-top: auto; }

    /* Work grid */
    .work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 40px; }
    .work-card { cursor: pointer; transition: transform 220ms; }
    .work-card:hover { transform: translateY(-4px); }
    .work-card .media { height: 360px; border-radius: 4px; overflow: hidden; position: relative; }
    .work-card .media { background-size: cover; background-position: center; }
    .work-card.a .media { background-image: url('assets/photos/stage-purple.jpg'); }
    .work-card.b .media { background-image: url('assets/photos/gala-green.jpg'); }
    .work-card.c .media { background-image: url('assets/photos/lounge-white.jpg'); }
    .work-card.d .media { background-image: url('assets/photos/rgb-tubes.jpg'); }
    .work-card .tag { position: absolute; top: 16px; left: 16px; font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #fff; padding: 6px 12px; background: rgba(0,0,0,0.28); border-radius: 2px; }
    .work-card .meta { padding-top: 16px; display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .work-card .title { font-family: var(--font-display); font-weight: 500; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .work-card .year { font-family: var(--font-mono); font-size: 12px; color: var(--fg3); flex-shrink: 0; }
    .work-card .desc { color: var(--fg2); font-size: 14px; margin-top: 8px; }

    /* Case detail */
    .case-hero { height: 480px; border-radius: 4px; overflow: hidden; display:flex; align-items:flex-end; padding: 32px; color: #fff; position: relative; background-size: cover; background-position: center; }
    .case-hero::before { content:''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(24,25,48,0.1) 0%, rgba(24,25,48,0.75) 100%); }
    .case-hero > * { position: relative; z-index: 1; }
    .case-hero.a { background-image: url('assets/photos/stage-purple.jpg'); }
    .case-hero.b { background-image: url('assets/photos/gala-green.jpg'); }
    .case-hero.c { background-image: url('assets/photos/lounge-white.jpg'); }
    .case-hero.d { background-image: url('assets/photos/rgb-tubes.jpg'); }
    .case-hero .tag { background: var(--ite-tea-green); color: var(--ite-midnight-navy); padding: 6px 12px; border-radius: 2px; font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; display: inline-block; margin-bottom: 16px; }
    .case-hero h1 { font-family: var(--font-display); font-weight: 500; font-size: 56px; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.05; margin: 0; color: #fff; max-width: 18ch; }

    .case-details { display: grid; grid-template-columns: 1fr 2fr; gap: 64px; margin-top: 48px; }
    .case-specs { display: flex; flex-direction: column; gap: 16px; }
    .spec { display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--divider); font-size: 14px; }
    .spec dt { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg3); }
    .spec dd { margin: 0; color: var(--fg1); }

    /* Testimonial */
    .testimonial { text-align: center; max-width: 900px; margin: 0 auto; }
    .testimonial .quote { font-family: var(--font-display); font-weight: 500; font-size: 32px; letter-spacing: 0.04em; line-height: 1.3; color: #fff; text-transform: none; }
    .testimonial .attrib { margin-top: 32px; font-family: var(--font-display); font-weight: 500; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ite-tea-green); }

    /* Form */
    .form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 760px; margin-top: 32px; }
    .form .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg2); }
    .field input, .field select, .field textarea {
      font-family: var(--font-body); font-size: 15px;
      padding: 14px 16px; border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--fg1);
      transition: border-color 120ms;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--ite-midnight-navy);
    }

    /* Footer */
    .footer { background: var(--ite-midnight-navy); color: #fff; padding: 80px 0 40px; }
    .footer .cols { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; }
    .footer h4 { font-family: var(--font-display); font-weight: 500; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ite-tea-green); margin: 0 0 18px; }
    .footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .footer a { color: rgba(255,255,255,0.85); font-size: 14px; }
    .footer a:hover { color: var(--ite-tea-green); }
    .footer .brand-block img { height: 48px; margin-bottom: 16px; }
    .footer .lead { color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.7; max-width: 36ch; }
    .footer .fine { margin-top: 56px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.12); display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); font-family: var(--font-mono); }

    /* Utility */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    .inline { display: inline; }

    /* =========================================================
       venues.css
       ========================================================= */

    /* Page-level header */
    .page-header {
      background: var(--ite-midnight-navy);
      color: #fff;
      padding: 120px 0 96px;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(24,25,48,0.55) 0%, rgba(24,25,48,0.92) 100%),
        url('assets/photos/gala-green.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.7;
    }
    .page-header .container { position: relative; }
    .page-header .breadcrumb {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ite-tea-green);
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .page-header .breadcrumb a { color: rgba(255,255,255,0.7); cursor: pointer; }
    .page-header .breadcrumb a:hover { color: var(--ite-tea-green); }
    .page-header .breadcrumb .sep { color: rgba(255,255,255,0.35); }
    .page-header h1 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 84px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.0;
      margin: 0;
      color: #fff;
      max-width: 14ch;
    }
    .page-header h1 .grad {
      background: var(--ite-green-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .page-header .lead {
      color: rgba(255,255,255,0.82);
      max-width: 60ch;
      margin: 32px 0 0;
      font-size: 19px;
      line-height: 1.65;
    }

    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = React.useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
        };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      React.useEffect(() => {
        if (!open) return;
        clampToViewport();
        if (typeof ResizeObserver === 'undefined') {
          window.addEventListener('resize', clampToViewport);
          return () => window.removeEventListener('resize', clampToViewport);
        }
        const ro = new ResizeObserver(clampToViewport);
        ro.observe(document.documentElement);
        return () => ro.disconnect();
      }, [open, clampToViewport]);

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e && e.data && e.data.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = {
            x: startRight - (ev.clientX - sx),
            y: startBottom - (ev.clientY - sy),
          };
          clampToViewport();
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel"
               style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" aria-label="Close tweaks"
                      onMouseDown={(e) => e.stopPropagation()}
                      onClick={dismiss}>✕</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakSection({ label, children }) {
      return (
        <>
          <div className="twk-sect">{label}</div>
          {children}
        </>
      );
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>

          </div>

      );
    }

    function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
      return (

          <input type="range" className="twk-slider" min={min} max={max} step={step}

    }

    function TweakToggle({ label, value, onChange }) {
      return (
        <div className="twk-row twk-row-h">
          <div className="twk-lbl"><span>{label}</span></div>
          <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
                  role="switch" aria-checked={!!value}
                  onClick={() => onChange(!value)}><i /></button>
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;
      const valueRef = React.useRef(value);
      valueRef.current = value;

      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const inner = r.width - 4;
        const i = Math.floor(((clientX - r.left - 2) / inner) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };

      const onPointerDown = (e) => {
        setDragging(true);
        const v0 = segAt(e.clientX);
        if (v0 !== valueRef.current) onChange(v0);
        const move = (ev) => {
          if (!trackRef.current) return;
          const v = segAt(ev.clientX);
          if (v !== valueRef.current) onChange(v);
        };
        const up = () => {
          setDragging(false);
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };

      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
               className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb"
                 style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                          width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
                {o.label}
              </button>
            ))}
          </div>
        </TweakRow>
      );
    }

    function TweakSelect({ label, value, options, onChange }) {
      return (
        <TweakRow label={label}>
          <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
            {options.map((o) => {
              const v = typeof o === 'object' ? o.value : o;
              const l = typeof o === 'object' ? o.label : o;
              return <option key={v} value={v}>{l}</option>;
            })}
          </select>
        </TweakRow>
      );
    }

    function TweakText({ label, value, placeholder, onChange }) {
      return (
        <TweakRow label={label}>
          <input className="twk-field" type="text" value={value} placeholder={placeholder}
                 onChange={(e) => onChange(e.target.value)} />
        </TweakRow>
      );
    }

    function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
      const clamp = (n) => {
        if (min != null && n < min) return min;
        if (max != null && n > max) return max;
        return n;
      };
      const startRef = React.useRef({ x: 0, val: 0 });
      const onScrubStart = (e) => {
        e.preventDefault();
        startRef.current = { x: e.clientX, val: value };
        const decimals = (String(step).split('.')[1] || '').length;
        const move = (ev) => {
          const dx = ev.clientX - startRef.current.x;
          const raw = startRef.current.val + dx * step;
          const snapped = Math.round(raw / step) * step;
          onChange(clamp(Number(snapped.toFixed(decimals))));
        };
        const up = () => {
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };
      return (
        <div className="twk-num">
          <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
          <input type="number" value={value} min={min} max={max} step={step}
                 onChange={(e) => onChange(clamp(Number(e.target.value)))} />
          {unit && <span className="twk-num-unit">{unit}</span>}
        </div>
      );
    }

    function TweakColor({ label, value, onChange }) {
      return (
        <div className="twk-row twk-row-h">
          <div className="twk-lbl"><span>{label}</span></div>
          <input type="color" className="twk-swatch" value={value}
                 onChange={(e) => onChange(e.target.value)} />
        </div>
      );
    }

    function TweakButton({ label, onClick, secondary = false }) {
      return (
        <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
                onClick={onClick}>{label}</button>
      );
    }

        className="venue-card"
        onClick={onClick}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick(); } }}
        tabIndex={0}
        role="button"
        aria-label={`View ${v.name}`}
      >
        <div className="media" style={{ backgroundImage: `url(${v.photo})` }}>
          <div className="city-tag">{v.city}</div>
          <div className="cap-tag">
            <i data-lucide="users" />
            Up to {v.capacity}
          </div>
        </div>
        <div className="info">
          <h3 className="name">{v.name}</h3>
          <div className="address">
            <i data-lucide="map-pin" />
            <span>{v.address}</span>
          </div>
          <div className="row-bottom">
            <span className="style">{v.style}</span>
            <span className="view">
              View Venue
              <i data-lucide="arrow-right" />
            </span>
          </div>
        </div>
      </div>
    );

    const VenuesGrid = ({ list, onSelect }) => (
      <section className="venues-section">
        <div className="container">
          <div className="section-head">
            <div>
              <Eyebrow>The Full List</Eyebrow>
              <HeadingHairline />
              <h2 className="display m">All venues</h2>
            </div>
            <p className="body-l" style={{ margin: 0, maxWidth: '36ch', fontSize: 14 }}>
              Sorted by frequency of recent ITE production work. Don't see your venue? We work nationwide.
            </p>
          </div>
          <div className="venues-grid">
            {list.map((v) => (
              <VenueCard key={v.id} v={v} onClick={() => onSelect(v)} />
            ))}
          </div>
        </div>
      </section>
    );

    const VenueCTA = () => (
      <section className="cta-band">
        <div className="container">
          <div className="inner">
            <div>
              <Eyebrow>Don't See Your Venue?</Eyebrow>
              <HeadingHairline />
              <h2>We travel the production with you.</h2>
              <p>
                We've built shows in 30+ states. Tell us where, and our team will bring the rig,
                the rentals, and the crew. Out-of-state or out-of-country logistics flow through our
                sister company.
              </p>
              <div className="actions" style={{ marginTop: 32 }}>
                <Button kind="gradient">Start a Project</Button>
                <Button kind="ghost" style={{ color: '#C7DA84' }}>Talk to an Account Lead →</Button>
              </div>
              <div className="sister">
                International? <a>Visit Business Jaunt →</a>
              </div>
            </div>
            <div style={{
              padding: 32,
              border: '1px solid rgba(255,255,255,0.18)',
              borderRadius: 4,
              background: 'rgba(255,255,255,0.04)'
            }}>
              <div className="eyebrow" style={{ color: '#C7DA84' }}>Quick Inquiry</div>
              <div className="heading-hairline" style={{ background: 'rgba(255,255,255,0.3)' }} />
              <h3 style={{
                fontFamily: 'var(--font-display)',
                fontWeight: 500,
                fontSize: 22,
                letterSpacing: '0.10em',
                textTransform: 'uppercase',
                margin: '0 0 20px',
                color: '#fff',
              }}>
                Tell us about your event
              </h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                {[
                  ['calendar', 'Event date'],
                  ['users', 'Estimated guest count'],
                  ['map-pin', 'Preferred venue or city'],
                ].map(([icon, label]) => (
                  <div key={label} style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: 12,
                    padding: '12px 14px',
                    background: 'rgba(255,255,255,0.06)',
                    border: '1px solid rgba(255,255,255,0.14)',
                    borderRadius: 4,
                    color: 'rgba(255,255,255,0.6)',
                    fontFamily: 'var(--font-body)',
                    fontSize: 14,
                  }}>
                    <i data-lucide={icon} style={{ width: 16, height: 16, color: '#C7DA84' }} />
                    {label}
                  </div>
                ))}
                <Button kind="gradient" style={{ marginTop: 4 }}>Request a Quote</Button>
              </div>
            </div>
          </div>
        </div>
      </section>
    );

    const VenueModal = ({ v, onClose }) => {
      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        if (v) window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [v, onClose]);

      return (
        <div
          className={`modal-backdrop ${v ? 'open' : ''}`}
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-label={v ? v.name : 'Venue detail'}
        >
          <div className="modal-wrap" onClick={(e) => e.stopPropagation()}>
            <button className="close" onClick={onClose} aria-label="Close">
              <i data-lucide="x" style={{ width: 16, height: 16 }} />
            </button>
            {v && (
              <div className="modal">
                <div className="ph" style={{ backgroundImage: `url(${v.photo})` }} />
                <div className="body">
                  <div className="eyebrow">{v.style}</div>
                  <h3>{v.name}</h3>
                  <div className="addr">
                    <i data-lucide="map-pin" />
                    <span>{v.address}</span>
                  </div>
                  <p className="desc">{v.desc}</p>
                  <div className="specs">
                    <div className="spec"><div className="l">Capacity</div><div className="v">Up to {v.capacity} guests</div></div>
                    <div className="spec"><div className="l">Footprint</div><div className="v">{v.sqft}</div></div>
                    <div className="spec"><div className="l">Ceiling</div><div className="v">{v.ceiling}</div></div>
                    <div className="spec"><div className="l">Region</div><div className="v">{v.city}</div></div>
                  </div>
                  <div className="actions">
                    <Button kind="primary">Plan an Event Here</Button>
                    <Button kind="ghost">Get Directions →</Button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // =========================================================
    // App — from Venues Page.html
    // =========================================================

    const { useState, useEffect, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showFeatured": true,
      "headerStyle": "photo",
      "cardLayout": "3col"
    }/*EDITMODE-END*/;

    function App() {
      const [filter, setFilter] = useState('all');
      const [selected, setSelected] = useState(null);
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const featured = window.VENUES.find((v) => v.featured);
      const others = window.VENUES.filter((v) => !v.featured);

      const filtered = useMemo(() => {
        if (filter === 'all') return others;
        return others.filter((v) => v.region === filter);
      }, [filter, others]);

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty(
          '--venues-grid-cols',
          tweaks.cardLayout === '2col' ? '2' :
          tweaks.cardLayout === '4col' ? '4' : '3'
        );
      }, [tweaks.cardLayout]);

      useEffect(() => {
        document.body.style.overflow = selected ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [selected]);

      return (
        <>
          <Nav active="venues" />
          {tweaks.headerStyle !== 'minimal' && <VenuesHeader />}
          <FilterBar
            active={filter}
            setActive={setFilter}
            total={(tweaks.showFeatured && filter === 'all' ? 1 : 0) + filtered.length}
          />
          {tweaks.showFeatured && featured && filter === 'all' && (
            <FeaturedVenue v={featured} onView={setSelected} />
          )}
          <VenuesGrid list={filtered} onSelect={setSelected} />
          <VenueCTA />
          <Footer />

          <VenueModal v={selected} onClose={() => setSelected(null)} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Layout">
              <TweakToggle
                label="Show featured venue"
                value={tweaks.showFeatured}
                onChange={(v) => setTweak('showFeatured', v)}
              />
              <TweakRadio
                label="Header style"
                value={tweaks.headerStyle}
                onChange={(v) => setTweak('headerStyle', v)}
                options={[
                  { value: 'photo', label: 'Photo' },
                  { value: 'minimal', label: 'Off' },
                ]}
              />
              <TweakRadio
                label="Card grid"
                value={tweaks.cardLayout}
                onChange={(v) => setTweak('cardLayout', v)}
                options={[
                  { value: '2col', label: '2 col' },
                  { value: '3col', label: '3 col' },
                  { value: '4col', label: '4 col' },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
